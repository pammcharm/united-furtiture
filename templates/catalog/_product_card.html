<article
  class="product-card motion-card"
  data-product-room="{{ product.room_type }}"
  data-product-name="{{ product.name }}"
  data-product-material="{{ product.material }}"
  data-product-category="{{ product.category }}"
  data-product-color="{{ product.color }}"
  data-product-size="{{ product.size }}"
  data-product-type="{{ product.furniture_type }}"
  data-product-tags="{{ product.tags }}"
  data-product-custom="{{ product.custom_order_available|yesno:'yes,no' }}"
  data-product-stock="{% if product.stock > 0 %}in-stock{% else %}sold-out{% endif %}"
  data-product-price="{{ product.price }}"
>
  <a href="{% url 'catalog:product_detail' product.slug %}">
    <div class="relative overflow-hidden">
      <img src="{{ product.image_url }}" alt="{{ product.name }}">
      <span class="absolute left-3 top-3 rounded-md bg-white/90 px-2 py-1 text-xs font-black text-zinc-950">{{ product.category }}</span>
    </div>
  </a>
  <div class="p-4">
    <div class="flex items-start justify-between gap-3">
      <div>
        <h3 class="text-base font-black">{{ product.name }}</h3>
        <p class="mt-1 text-sm text-zinc-500">{{ product.material }} - {{ product.size }}</p>
      </div>
      <span class="shrink-0 text-right text-sm font-black text-emerald-700">{{ product.formatted_price }}</span>
    </div>
    <div class="mt-5 grid grid-cols-2 gap-2">
      <a href="{% url 'catalog:product_detail' product.slug %}" class="btn-dark"><i data-lucide="eye" class="size-4"></i> View</a>
      {% if product.id %}
        <a href="{% url 'cart:add' product.id %}" class="btn-primary"><i data-lucide="shopping-cart" class="size-4"></i> Add</a>
      {% else %}
        <a href="{{ product.whatsapp_url }}" class="btn-primary"><i data-lucide="message-circle" class="size-4"></i> Order</a>
      {% endif %}
    </div>
  </div>
</article>
