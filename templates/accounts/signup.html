{% extends "base.html" %}

{% block title %}Create Account - {{ business.name }}{% endblock %}

{% block content %}
<section class="bg-zinc-950 pt-28 text-white">
  <div class="mx-auto max-w-7xl px-4 pb-10 sm:px-6 lg:px-8">
    <p class="text-sm font-black uppercase tracking-[0.18em] text-emerald-300">Customer account</p>
    <h1 class="mt-3 max-w-3xl text-4xl font-black tracking-tight sm:text-6xl">Create your United Furniture account.</h1>
  </div>
</section>
<section class="bg-white py-12">
  <div class="mx-auto grid max-w-4xl gap-6 px-4 sm:px-6 lg:px-8">
    <form method="post" class="motion-card grid gap-4 rounded-md border border-zinc-200 bg-stone-50 p-5">
      {% csrf_token %}
      {% include "accounts/_form_errors.html" %}
      <div class="grid gap-4 sm:grid-cols-2">
        <label class="form-label">Username {{ form.username }}</label>
        <label class="form-label">Email {{ form.email }}</label>
        <label class="form-label">First name {{ form.first_name }}</label>
        <label class="form-label">Last name {{ form.last_name }}</label>
        <label class="form-label">Phone {{ form.phone_number }}</label>
        <label class="form-label">Delivery location {{ form.delivery_location }}</label>
        <label class="form-label">Password {{ form.password1 }}</label>
        <label class="form-label">Confirm password {{ form.password2 }}</label>
      </div>
      <button class="btn-dark" type="submit">Create account</button>
      <a href="{% url 'accounts:login' %}" class="text-sm font-bold text-emerald-700">Already have an account? Login</a>
    </form>
  </div>
</section>
{% endblock %}
